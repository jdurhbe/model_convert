  onnx2rknn:
    strategy:
      matrix:
        runs-on: [ubuntu-22.04]
    runs-on: ${{ matrix.runs-on }}
    container:
      image: kaylor/rk3588_onnx2rknn:2.3.2
      options: --privileged

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1000
        fetch-tags: true

    - name: Install wget and convert
      run: |
        # 安装 wget
        apt-get update && apt-get install -y wget
        
        # 创建目录
        mkdir -pv yolo/rknn
        
        # 下载 ONNX 模型
        wget https://github.com/jdurhbe/model_convert/releases/download/onnx/yolo.onnx -O yolo/rknn/yolo.onnx
        
        # 进入 yolo 目录执行转换（假设 convert.pyc 位于仓库根目录的 yolo/ 下）
        cd yolo
        python convert.pyc rknn/yolo.onnx rk3588 i8 rknn/yolo.rknn
        
        # 复制 ONNX 文件供后续 om 使用
        cd ..
        mkdir -p yolo/onnx
        cp yolo/rknn/yolo.onnx yolo/onnx/
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: model_artifacts
        path: |
          yolo/onnx/*.onnx
          yolo/rknn/*.rknn
