name: 自动下载ONNX转RKNN（纯转换）

on:
  workflow_dispatch:

env:
  ONNX_DOWNLOAD_DIR: ${{ github.workspace }}/downloaded_onnx
  RKNN_OUTPUT_DIR: ${{ github.workspace }}/final_rknn
  ONNX_FILE_NAME: best.onnx
  RKNN_FILE_NAME: converted.rknn
  TARGET_CHIP: rk3588
  QUANTIZATION: fp16
  INPUT_W: 256
  INPUT_H: 256
  INPUT_MEAN: "0 0 0"
  INPUT_STD: "255 255 255"
  DATASET_TXT: ""

jobs:
  convert_rknn:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库转换脚本
        uses: actions/checkout@v4

      - name: 初始化自定义目录
        run: |
          mkdir -p $ONNX_DOWNLOAD_DIR
          mkdir -p $RKNN_OUTPUT_DIR

      - name: 配置Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          # 注意：已移除 cache: pip，避免因缺少 requirements.txt 报错

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y libgl1-mesa-glx libglib2.0-0 gcc g++ wget

      - name: 安装RKNN转换依赖
        run: |
          pip install --upgrade pip
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple \
            numpy opencv-python onnx rknn-toolkit2==1.6.0

      - name: 下载GitHub Releases中的ONNX模型
        run: |
          wget https://github.com/jdurhbe/model_convert/releases/download/onnx/HJ0320V8_256.onnx \
            -O $ONNX_DOWNLOAD_DIR/$ONNX_FILE_NAME
          echo "下载完成，文件信息："
          ls -lh $ONNX_DOWNLOAD_DIR/$ONNX_FILE_NAME

      - name: 准备int8校准数据集
        if: env.QUANTIZATION == 'int8' && env.DATASET_TXT == ''
        run: |
          echo "警告：未提供DATASET_TXT，将生成占位文件，请替换为真实图片路径！"
          echo "./placeholder.jpg" > ${{ github.workspace }}/dataset.txt

      - name: 使用自定义dataset.txt
        if: env.QUANTIZATION == 'int8' && env.DATASET_TXT != ''
        run: |
          cp $DATASET_TXT ${{ github.workspace }}/dataset.txt

      - name: 执行ONNX到RKNN转换
        run: |
          python rknn_convert.py \
            --onnx_path $ONNX_DOWNLOAD_DIR/$ONNX_FILE_NAME \
            --rknn_path $RKNN_OUTPUT_DIR/$RKNN_FILE_NAME \
            --target_platform $TARGET_CHIP \
            --quantization $QUANTIZATION \
            --input_w $INPUT_W \
            --input_h $INPUT_H \
            --input_mean $INPUT_MEAN \
            --input_std $INPUT_STD \
            ${DATASET_TXT:+--dataset ${{ github.workspace }}/dataset.txt}

      - name: 上传最终RKNN模型
        uses: actions/upload-artifact@v4
        with:
          name: rknn-converted-model
          path: ${{ env.RKNN_OUTPUT_DIR }}
          retention-days: 30
