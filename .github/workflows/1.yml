name: 自动下载ONNX转RKNN（纯转换）

on:
workflow_dispatch:

env:
ONNX_DOWNLOAD_DIR: ${{ github.workspace }}/downloaded_onnx
RKNN_OUTPUT_DIR: ${{ github.workspace }}/final_rknn
ONNX_FILE_NAME: best.onnx
RKNN_FILE_NAME: converted.rknn
TARGET_CHIP: rk3588
INPUT_W: 416
INPUT_H: 416
INPUT_MEAN: "0 0 0"
INPUT_STD: "255 255 255"

jobs:
convert:
runs-on: ubuntu-22.04

```
steps:
  - name: 拉取代码
    uses: actions/checkout@v4

  # 注意：
  # 删除 cache: pip
  # 否则仓库没有 requirements.txt 会报错
  - name: 安装 Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: 显示 Python 版本
    run: |
      python --version
      pip --version

  - name: 创建目录
    run: |
      mkdir -p "${ONNX_DOWNLOAD_DIR}"
      mkdir -p "${RKNN_OUTPUT_DIR}"

  - name: 安装系统依赖
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        wget \
        git \
        libglib2.0-0 \
        libsm6 \
        libxrender1 \
        libxext6 \
        libgl1

  - name: 安装 Python 依赖
    run: |
      python -m pip install --upgrade pip

      pip install \
        numpy \
        scipy \
        protobuf \
        onnx==1.13.1 \
        onnxruntime \
        opencv-python \
        matplotlib \
        tqdm

  - name: 下载 ONNX
    run: |
      wget \
        -O "${ONNX_DOWNLOAD_DIR}/${ONNX_FILE_NAME}" \
        "https://github.com/jdurhbe/model_convert/releases/download/onnx/SF_v11s_501_640.onnx"

  - name: 检查模型
    run: |
      ls -lh "${ONNX_DOWNLOAD_DIR}"

  - name: 输出 ONNX 信息
    run: |
      python - << EOF
      import onnx

      model = onnx.load("${ONNX_DOWNLOAD_DIR}/${ONNX_FILE_NAME}")

      print("输入信息:")
      for inp in model.graph.input:
          dims = []
          for d in inp.type.tensor_type.shape.dim:
              dims.append(d.dim_value)
          print(inp.name, dims)

      print("输出信息:")
      for out in model.graph.output:
          print(out.name)
      EOF

  # 如果仓库有 rknn_convert.py
  - name: ONNX转RKNN
    run: |
      python rknn_convert.py \
        --onnx_path "${ONNX_DOWNLOAD_DIR}/${ONNX_FILE_NAME}" \
        --rknn_path "${RKNN_OUTPUT_DIR}/${RKNN_FILE_NAME}" \
        --target_platform "${TARGET_CHIP}" \
        --input_w "${INPUT_W}" \
        --input_h "${INPUT_H}" \
        --input_mean ${INPUT_MEAN} \
        --input_std ${INPUT_STD}

  - name: 查看输出
    run: |
      ls -lah "${RKNN_OUTPUT_DIR}"

  - name: 上传RKNN
    uses: actions/upload-artifact@v4
    with:
      name: rknn_model
      path: ${{ env.RKNN_OUTPUT_DIR }}
      retention-days: 30
```
