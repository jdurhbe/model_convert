name: ONNX to RKNN Converter
on:
  workflow_dispatch: # 只保留手动触发，避免误操作
  # push:
  #   branches: [ master ] # 需要推送自动转换就取消注释

jobs:
  convert_rknn:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置Python 3.10（RKNN工具链强制要求）
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y libgl1-mesa-glx libglib2.0-0 gcc g++

      - name: 安装转换依赖（含RKNN-Toolkit2）
        run: |
          python -m pip install --upgrade pip
          # 清华源加速，解决国外下载慢问题
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple \
            numpy opencv-python pillow onnx onnxruntime \
            rknn-toolkit2==1.6.0 # 对应RK3588最新工具链，RK3566用1.5.2

      - name: 🔴 执行ONNX转RKNN（修改这里的参数）
        run: |
          python rknn_convert.py \
            --onnx_path=./onnx_model/yolov8s_custom.onnx \ # 改成你的ONNX文件名
            --rknn_path=./rknn_model/yolov8s_custom.rknn \ # 输出的RKNN文件名
            --target_platform=rk3588 \ # 改成你的芯片：rk3588/rk3566/rk3568
            --quantization=fp16 \ # 量化方式：fp16（无需校准）/int8（需要校准集）
            --input_size=640 640 \ # 模型输入尺寸（宽 高）
            --input_mean=0 0 0 \ # YOLO系列默认均值
            --input_std=255 255 255 \ # YOLO系列默认标准差
            --output_dir=./rknn_model/

      - name: 上传生成的RKNN模型
        uses: actions/upload-artifact@v4
        with:
          name: rknn-converted-model
          path: ./rknn_model/
          retention-days: 30 # 模型保留30天，足够下载
